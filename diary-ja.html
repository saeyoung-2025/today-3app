<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日記 - Today App</title>
    <link rel="icon" type="image/png" href="icon-192.png">
    <script src="https://unpkg.com/dexie@3.2.3/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sunflower:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
/* ===== common.css ===== */
/* ================================================
   TodayTab - Common Stylesheet
   공통 스타일시트 - 모든 앱 파일에서 사용
   ================================================ */
/* ── CSS 변수 (공통) ── */
:root {
    --font: 'Sunflower', sans-serif;
    --accent: #6366F1;
    --success: #10B981;
    --danger: #EF4444;
    --warning: #F59E0B;
    --saving: #3B82F6;
    --text-primary: rgba(0,0,0,0.80);
    --text-secondary: rgba(0,0,0,0.55);
    --text-muted: rgba(0,0,0,0.38);
    --glass-bg: rgba(255,255,255,0.50);
    --glass-blur: blur(14px);
    --radius: 8px;
    --transition: all 0.2s ease;
    --border-color: rgba(255,255,255,0.7);
    --bg-card: rgba(255,255,255,0.55);
    --bg-primary: rgba(255,255,255,0.35);
}

/* ── 기본 리셋 ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); min-height: 100vh; overflow-x: hidden; }

/* ── 오로라 배경 공통 ── */
.aurora {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden; pointer-events: none;
}
.blob { position: absolute; border-radius: 50%; filter: blur(50px); opacity: 0.55; }

/* ── 컨테이너 ── */
.container {
    position: relative; z-index: 2;
    max-width: 480px; margin: 0 auto;
    padding: 16px 16px 80px;
}

/* ── 페이지 헤더 ── */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.page-header h1 { font-size: 18px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
.page-header h1 i { color: var(--accent); }

/* ── nav 바 ── */
.nav-bar { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 14px; }
.nav-btn {
    width: 34px; height: 34px; border-radius: var(--radius);
    border: none; background: var(--glass-bg); backdrop-filter: var(--glass-blur);
    color: var(--text-secondary); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; transition: var(--transition);
}
.nav-btn:hover { background: rgba(255,255,255,0.75); color: var(--accent); }
.nav-btn:disabled { opacity: 0.35; cursor: default; }
.page-indicator { font-size: 13px; font-weight: 700; color: var(--text-secondary); }

/* ── 글래스 카드 ── */
.card {
    background: var(--glass-bg); backdrop-filter: var(--glass-blur);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
}
.card-title {
    font-size: 14px; font-weight: 700; color: var(--text-primary);
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
}
.card-title i { color: var(--accent); }

/* ── 폼 요소 ── */
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; }
.form-input, .form-textarea, .form-select {
    width: 100%; padding: 10px 14px;
    background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.85);
    border-radius: var(--radius); font-family: var(--font);
    font-size: 13px; font-weight: 500; color: var(--text-primary);
    transition: var(--transition);
}
.form-input:focus, .form-textarea:focus, .form-select:focus {
    outline: none; border-color: var(--accent); background: rgba(255,255,255,0.78);
}
.form-textarea { min-height: 80px; resize: vertical; line-height: 1.6; }
.action-buttons { display: flex; gap: 8px; }
.form-label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }

/* ── 버튼 ── */
.btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px; border: none; border-radius: var(--radius);
    font-family: var(--font); font-size: 13px; font-weight: 700;
    cursor: pointer; transition: var(--transition);
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #5254CC; }
.btn-secondary { background: rgba(255,255,255,0.6); color: var(--text-secondary); backdrop-filter: var(--glass-blur); }
.btn-secondary:hover { background: rgba(255,255,255,0.85); color: var(--accent); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #059669; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #CC3333; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; }

/* ── 음성 버튼 ── */
.voice-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 30px; height: 30px; border-radius: 50%; border: none;
    background: var(--accent); color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; transition: var(--transition);
}
.voice-btn.recording { background: var(--danger); animation: pulse 1s infinite; }
.voice-btn-textarea { top: auto; bottom: 8px; transform: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* ── 빈 상태 ── */
.empty-state { text-align: center; padding: 28px 16px; color: var(--text-muted); }
.empty-state i { font-size: 2.2rem; margin-bottom: 10px; display: block; }
.empty-state p { font-size: 12px; font-weight: 500; }

/* ── 페이지 전환 ── */
.page-content { display: none; }
.page-content.active { display: block; }

/* ── 모달 ── */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
.modal.active { display: flex; }
.modal-content { background: rgba(255,255,255,0.92); backdrop-filter: var(--glass-blur); border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; position: relative; }
.modal-close { position: absolute; top: 12px; right: 12px; width: 30px; height: 30px; border-radius: 50%; border: none; background: rgba(0,0,0,0.08); color: var(--text-secondary); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
.modal-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; }

/* ── 팝업 ── */
.info-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); z-index: 1100; align-items: center; justify-content: center; }
.info-popup.active { display: flex; }
.info-popup-content { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 24px; width: 90%; max-width: 360px; }
.info-popup-content h4 { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: var(--text-primary); }
.info-popup-content p { font-size: 12px; font-weight: 500; color: var(--text-secondary); line-height: 1.7; white-space: pre-line; margin-bottom: 14px; }

/* ── 통계 박스 ── */
.stat-box { background: rgba(255,255,255,0.55); border-radius: var(--radius); padding: 12px; text-align: center; }
.stat-box .label { font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; }
.stat-box .value { font-size: 22px; font-weight: 700; color: var(--accent); }

/* ── 목표 표시 ── */
.goal-display { background: rgba(255,255,255,0.55); border-radius: var(--radius); padding: 14px; font-size: 13px; font-weight: 500; color: var(--text-primary); line-height: 1.7; white-space: pre-wrap; margin-bottom: 12px; }

/* ── 섹션 박스 ── */
.section-box { background: rgba(255,255,255,0.4); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; }
.section-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; }
.section-items { padding: 8px; }
.empty-section { text-align: center; padding: 12px; font-size: 12px; font-weight: 500; color: var(--text-muted); }
.fixed-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: rgba(255,255,255,0.55); border-radius: var(--radius); margin-bottom: 6px; }
.item-info { flex: 1; }
.item-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.item-note { font-size: 11px; font-weight: 300; color: var(--text-muted); margin-top: 2px; }
.item-amount { font-size: 13px; font-weight: 700; margin: 0 10px; }
.item-actions { display: flex; gap: 6px; }

/* ── 요약 박스 ── */
.summary-box { background: rgba(255,255,255,0.55); border-radius: var(--radius); padding: 14px; }
.summary-title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; }
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; }
.summary-row.with-border { border-top: 1px solid rgba(255,255,255,0.7); margin-top: 4px; padding-top: 10px; }
.summary-row.highlight { background: rgba(99,102,241,0.08); border-radius: var(--radius); padding: 8px 10px; margin-top: 6px; }
.summary-row .label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
.summary-row .value { font-size: 13px; font-weight: 700; }
.summary-row .value.positive { color: var(--success); }
.summary-row .value.negative { color: var(--danger); }

/* ── 색상 유틸리티 ── */
.income, .income-text { color: var(--success); }
.expense, .expense-text { color: var(--danger); }
.saving-text { color: var(--saving); }
.fixed-text { color: var(--warning); }

/* ── 스크롤바 ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }


/* ===== diary app style ===== */

    /* ── 일기 전용 스타일 ── */
    /* 오로라 배경 B: 바다+노을 */
    body { background: #eaf0f5; }
    .blob-1 { width:220px;height:220px;top:-70px;left:-50px;background:#87ceeb; }
    .blob-2 { width:170px;height:170px;top:30px;right:-30px;background:#98e8c8; }
    .blob-3 { width:190px;height:190px;bottom:-50px;right:10px;background:#ffb347;opacity:0.4; }
    .blob-4 { width:150px;height:150px;bottom:20px;left:20px;background:#ffb6c1;opacity:0.45; }
    /* 일기 전용 */
    .diary-entry{background:rgba(255,255,255,0.55);backdrop-filter:var(--glass-blur);border-radius:var(--radius);padding:14px;margin-bottom:8px;transition:var(--transition);}
    .diary-entry:hover{background:rgba(255,255,255,0.7);}
    .diary-title{font-size:15px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:8px;margin-bottom:4px;}
    .diary-mood{font-size:1.1rem;}
    .diary-date{font-size:11px;font-weight:300;color:var(--text-muted);margin-bottom:6px;}
    .diary-content{font-size:13px;font-weight:500;color:var(--text-secondary);line-height:1.5;max-height:60px;overflow:hidden;text-overflow:ellipsis;margin-bottom:10px;}
    .diary-actions{display:flex;gap:8px;}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
    .mood-stats{display:flex;flex-wrap:wrap;gap:8px;}
    .mood-item{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.55);border-radius:var(--radius);padding:8px 12px;font-size:12px;font-weight:500;color:var(--text-secondary);}
    .mood-item .emoji{font-size:1.2rem;}
    .monthly-item{border-bottom:1px solid rgba(255,255,255,0.6);padding:12px 0;}
    .search-group{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
    .search-group > div{flex:1;position:relative;min-width:0;}
    .load-more-btn{width:100%;justify-content:center;margin-top:4px;}
    .backup-toggle-btn{width:100%;justify-content:space-between;background:rgba(255,255,255,0.45);color:var(--text-secondary);margin-bottom:8px;}
    .textarea-wrapper{position:relative;}
    .goal-section{margin-bottom:14px;}
    
</style>
  
</head>
<body>
<div class="aurora">
    <div class="blob blob-1" style="width:220px;height:220px;top:-70px;left:-50px;background:#87ceeb"></div>
    <div class="blob" style="width:170px;height:170px;top:30px;right:-30px;background:#98e8c8"></div>
    <div class="blob" style="width:190px;height:190px;bottom:-50px;right:10px;background:#ffb347;opacity:0.4"></div>
    <div class="blob" style="width:150px;height:150px;bottom:20px;left:20px;background:#ffb6c1;opacity:0.45"></div>
</div>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-book"></i><span>日記</span></h1>
        </div>

        <div class="nav-bar">
            <button id="prevPageBtn" class="nav-btn"><i class="fas fa-chevron-left"></i></button>
            <span class="page-indicator" id="pageIndicator">1 / 3</span>
            <button id="nextPageBtn" class="nav-btn"><i class="fas fa-chevron-right"></i></button>
        </div>

        <!-- Page 1: 日記を書く & リスト -->
        <div id="page1" class="page-content active">
            <div class="card">
                <div class="card-title"><i class="fas fa-pen"></i><span>日記を書く</span></div>
                <div class="form-group" style="position: relative;">
                    <input type="text" id="title" class="form-input" placeholder="タイトルを入力" style="padding-right: 45px;">
                    <button type="button" onclick="toggleVoiceInput('title')" class="voice-btn voice-btn-input" title="音声入力">
                        <i class="fas fa-microphone"></i>
                    </button>
                </div>
                <div class="form-group" style="position: relative;">
                    <textarea id="content" class="form-textarea" placeholder="今日の出来事を記録..."></textarea>
                    <button type="button" onclick="toggleVoiceInput('content')" class="voice-btn" title="音声入力">
                        <i class="fas fa-microphone"></i>
                    </button>
                </div>
                <div class="mood-group">
                    <label style="margin: 0; font-size: 0.85rem;">今日の気分：</label>
                    <select id="moodSelect" class="form-select">
                        <option value="Good">😄</option>
                        <option value="Okay" selected>🙂</option>
                        <option value="Bad">🙁</option>
                        <option value="Sad">😭</option>
                        <option value="Angry">😡</option>
                    </select>
                    <button id="saveDiaryBtn" class="btn btn-primary"><i class="fas fa-save"></i> <span>保存</span></button>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><i class="fas fa-list"></i><span>最近の日記</span></div>
                <div class="search-group">
                    <div style="position: relative; flex: 1;">
                        <input type="text" id="searchQuery" class="form-input" placeholder="タイトル/内容/日付で検索" style="padding-right: 45px;">
                        <button type="button" onclick="toggleVoiceInput('searchQuery')" class="voice-btn voice-btn-input" title="音声入力">
                            <i class="fas fa-microphone"></i>
                        </button>
                    </div>
                    <button id="searchBtn" class="btn btn-secondary btn-sm">検索</button>
                    <button id="listBtn" class="btn btn-secondary btn-sm">全て</button>
                </div>
                <div id="diaryList">
                    <div class="empty-state">
                        <i class="fas fa-book-open"></i>
                        <p>保存された日記はありません</p>
                    </div>
                </div>
                <button id="loadMoreBtn" class="btn btn-secondary load-more-btn" style="display: none;">もっと見る</button>
            </div>
        </div>

        <!-- Page 2: 統計 -->
        <div id="page2" class="page-content">
            <div class="card">
                <div class="card-title"><i class="fas fa-chart-bar"></i><span>日記統計</span></div>
                <div class="stats-grid">
                    <div class="stat-box"><div class="label">今月</div><div class="value" id="thisMonthCount">0</div></div>
                    <div class="stat-box"><div class="label">今年</div><div class="value" id="thisYearCount">0</div></div>
                    <div class="stat-box"><div class="label">合計</div><div class="value" id="totalCount">0</div></div>
                    <div class="stat-box"><div class="label" id="monthlyAvgLabel">月平均 (2026年)</div><div class="value" id="avgPerMonth">0</div></div>
                </div>
                <div class="card-title" style="margin-top: 20px;"><i class="fas fa-face-smile"></i><span>気分統計</span></div>
                <div class="mood-stats" id="moodStats"></div>
            </div>

            <div class="card">
                <div class="card-title"><i class="fas fa-calendar"></i><span>月別日記数</span></div>
                <div class="monthly-list" id="monthlyStats"></div>
            </div>
            
            <button class="btn btn-secondary" onclick="togglePastYears()" style="width: 100%; margin-bottom: 12px; background: white; border: 1px solid var(--border-color); box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <i class="fas fa-history" id="pastYearsIcon"></i> 
                <span id="pastYearsText">過去の年を見る</span>
            </button>
            <div id="pastYearsSection" style="display: none;"></div>
        </div>

        <!-- Page 3: 設定 -->
        <div id="page3" class="page-content">
            <div class="card">
                <div class="card-title"><i class="fas fa-bullseye"></i><span>私の決意</span></div>
                <div id="goalDisplayArea" style="display: none;">
                    <div id="goalDisplayText" style="background: var(--bg-primary); padding: 16px; border-radius: var(--radius-md); margin-bottom: 16px; line-height: 1.6; white-space: pre-wrap;"></div>
                    <div class="action-buttons">
                        <button id="editGoalBtn" class="btn btn-primary"><i class="fas fa-edit"></i> <span>編集</span></button>
                        <button id="deleteGoalBtn" class="btn btn-danger"><i class="fas fa-trash"></i> <span>削除</span></button>
                    </div>
                </div>
                <div id="goalEditArea">
                    <div class="form-group" style="position: relative;">
                        <textarea id="goalMemoInput" class="form-textarea" placeholder="日記の目標や決意を書いてください..."></textarea>
                        <button type="button" onclick="toggleVoiceInput('goalMemoInput')" class="voice-btn" title="音声入力">
                            <i class="fas fa-microphone"></i>
                        </button>
                    </div>
                    <div class="action-buttons">
                        <button id="saveGoalBtn" class="btn btn-primary"><i class="fas fa-save"></i> <span>保存</span></button>
                        <button id="cancelGoalBtn" class="btn btn-secondary" style="display: none;"><i class="fas fa-times"></i> <span>キャンセル</span></button>
                    </div>
                </div>
            </div>

            <button class="btn btn-secondary" onclick="toggleBackupSection()" style="width: 100%; margin-bottom: 12px; background: white; border: 1px solid var(--border-color); box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <i class="fas fa-chevron-down" id="backupToggleIcon"></i> 
                <span id="backupToggleText">バックアップ/リセットを展開</span>
            </button>
            
            <div id="backupSection" style="display: none;">
                <div class="card backup-card">
                    <div class="card-title"><i class="fas fa-cloud"></i><span>データバックアップ/復元</span></div>
                    <p style="font-size: 0.85rem; line-height: 1.6;">💾 全ての日記は永久に保存されています。</p>
                    
                    <div class="backup-btn-group">
                        <button class="btn btn-primary" onclick="displayDataAsJson()"><i class="fas fa-desktop"></i> <span>PCバックアップ</span></button>
                        <button class="btn btn-primary" onclick="mobileBackup()"><i class="fas fa-mobile-alt"></i> <span>モバイルバックアップ</span></button>
                        <input type="file" id="backupFileInput" accept=".json, .txt" style="display: none;" onchange="importDataFromJson(event)">
                        <button class="btn btn-secondary" onclick="document.getElementById('backupFileInput').click()"><i class="fas fa-upload"></i> <span>バックアップから復元</span></button>
                    </div>
                </div>

                <div class="card danger-card">
                    <div class="card-title"><i class="fas fa-exclamation-triangle"></i><span>危険ゾーン</span></div>
                    <p>下のボタンを押すと全てのデータが削除されます。</p>
                    <button id="globalResetBtn" class="btn btn-danger" style="width: 100%;"><i class="fas fa-trash"></i> <span>全ての日記をリセット</span></button>
                </div>
            </div>
        </div>
    </div>

    <script src="lang.js"></script>
    <script>
        window.addEventListener('message', (event) => {
            if (event.data.type === 'themeChange') {
                document.body.classList.remove('theme-gray');
                if (event.data.theme === 'gray') document.body.classList.add('theme-gray');
            }
            if (event.data.type === 'languageChange') {
                currentLang = event.data.lang;
                localStorage.setItem('appLanguage', currentLang);
                applyLanguage();
                renderDiaryList();
            }
        });

        const savedTheme = localStorage.getItem('today_app_theme');
        if (savedTheme === 'gray') document.body.classList.add('theme-gray');

        const db = new Dexie('StableDiaryDB_InitialDesign');
        db.version(56).stores({
            diaries: '++id, title, content, date, mood',
            goals: 'id'
        });

        const moodMap = { 'Good': '😄', 'Okay': '🙂', 'Bad': '🙁', 'Sad': '😭', 'Angry': '😡' };
        const moodMapKo = { '좋음': 'Good', '보통': 'Okay', '나쁨': 'Bad', '슬픔': 'Sad', '화남': 'Angry' };
        const moodLabels = { 'Good': '良い', 'Okay': '普通', 'Bad': '悪い', 'Sad': '悲しい', 'Angry': '怒り' };

        const ENTRIES_PER_PAGE = 5;
        let currentDisplayLimit = ENTRIES_PER_PAGE;
        let isSearching = false;
        let currentPage = 1;
        const totalPages = 3;

        function getLocale() { return 'ja-JP'; }

        function showPage(pageNumber) {
            currentPage = Math.min(Math.max(pageNumber, 1), totalPages);
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`page${currentPage}`).classList.add('active');
            document.getElementById('pageIndicator').textContent = `${currentPage} / ${totalPages}`;
            document.getElementById('prevPageBtn').disabled = (currentPage === 1);
            document.getElementById('nextPageBtn').disabled = (currentPage === totalPages);
            if (currentPage === 2) updateStats();
            if (currentPage === 3) loadGoal();
        }

        function formatDate(isoDate) {
            const date = new Date(isoDate);
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short', hour: '2-digit', minute: '2-digit', hour12: false };
            return date.toLocaleDateString(getLocale(), options);
        }

        async function saveDiary() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const mood = document.getElementById('moodSelect').value;
            if (title === '' || content === '') { alert('タイトルと内容を入力してください！'); return; }
            try {
                await db.diaries.add({ title, content, date: new Date().toISOString(), mood });
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
                document.getElementById('moodSelect').value = 'Okay';
                isSearching = false;
                currentDisplayLimit = ENTRIES_PER_PAGE;
                document.getElementById('searchQuery').value = '';
                renderDiaryList();
                alert('日記を保存しました！📝');
            } catch (error) { alert('保存中にエラーが発生しました。'); console.error(error); }
        }

        async function deleteDiary(id) {
            if (confirm('この日記を削除しますか？')) {
                try { await db.diaries.delete(id); renderDiaryList(); } catch (error) { console.error(error); }
            }
        }

        function getMoodEmoji(mood) {
            if (moodMap[mood]) return moodMap[mood];
            const englishMood = moodMapKo[mood];
            if (englishMood && moodMap[englishMood]) return moodMap[englishMood];
            return '❓';
        }

        async function renderDiaryList(query = null) {
            const diaryListElement = document.getElementById('diaryList');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            let allDiaries;
            const now = new Date();
            const thisMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
            
            try {
                if (query && query.trim() !== '') {
                    isSearching = true;
                    const searchLower = query.trim().toLowerCase();
                    const filtered = await db.diaries.filter(diary => {
                        const formattedDate = formatDate(diary.date).toLowerCase();
                        return diary.date.startsWith(thisMonth) && (
                            diary.title.toLowerCase().includes(searchLower) || 
                            diary.content.toLowerCase().includes(searchLower) || 
                            formattedDate.includes(searchLower)
                        );
                    }).toArray();
                    allDiaries = filtered.reverse();
                } else {
                    isSearching = false;
                    const thisMonthDiaries = await db.diaries.filter(diary => diary.date.startsWith(thisMonth)).toArray();
                    allDiaries = thisMonthDiaries.reverse();
                }
            } catch (e) { console.error(e); allDiaries = []; }
            
            diaryListElement.innerHTML = '';
            if (allDiaries.length === 0) {
                diaryListElement.innerHTML = '<div class="empty-state"><i class="fas fa-book-open"></i><p>' + (isSearching ? '検索結果がありません' : '今月の日記はありません') + '</p></div>';
                loadMoreBtn.style.display = 'none';
                return;
            }

            const diariesToDisplay = allDiaries.slice(0, currentDisplayLimit);
            diariesToDisplay.forEach(diary => {
                const entryElement = document.createElement('div');
                entryElement.className = 'diary-entry';
                const formattedDate = formatDate(diary.date);
                const moodEmoji = getMoodEmoji(diary.mood);
                entryElement.innerHTML = '<div class="diary-header"><div class="diary-title">' + diary.title + '<span class="diary-mood">' + moodEmoji + '</span></div></div><div class="diary-date">' + formattedDate + '</div><div class="diary-content">' + diary.content + '</div><div class="diary-actions"><button class="btn btn-secondary btn-sm" onclick="viewDiary(' + diary.id + ')"><i class="fas fa-eye"></i> 表示</button><button class="btn btn-danger btn-sm" onclick="deleteDiary(' + diary.id + ')"><i class="fas fa-trash"></i> 削除</button></div>';
                diaryListElement.appendChild(entryElement);
            });
            
            if (allDiaries.length > currentDisplayLimit) {
                loadMoreBtn.textContent = 'もっと見る (' + Math.min(allDiaries.length - currentDisplayLimit, ENTRIES_PER_PAGE) + ')';
                loadMoreBtn.style.display = 'block';
            } else { 
                loadMoreBtn.style.display = 'none'; 
            }
        }

        async function viewDiary(id) {
            const diary = await db.diaries.get(id);
            if (diary) {
                const moodEmoji = getMoodEmoji(diary.mood);
                alert(`📝 ${diary.title} ${moodEmoji}\n\n📅 ${formatDate(diary.date)}\n\n${diary.content}`);
            }
        }

        async function updateStats() {
            const allDiaries = await db.diaries.toArray();
            const now = new Date();
            const thisYear = now.getFullYear();
            const thisMonth = `${thisYear}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            const thisMonthDiaries = allDiaries.filter(d => d.date.startsWith(thisMonth));
            const thisYearDiaries = allDiaries.filter(d => d.date.startsWith(String(thisYear)));

            document.getElementById('thisMonthCount').textContent = thisMonthDiaries.length;
            document.getElementById('thisYearCount').textContent = thisYearDiaries.length;
            document.getElementById('totalCount').textContent = allDiaries.length;

            // 当年の月平均
            const currentMonthNum = now.getMonth() + 1;
            document.getElementById('avgPerMonth').textContent = thisYearDiaries.length > 0 ? Math.round(thisYearDiaries.length / currentMonthNum) : 0;
            document.getElementById('monthlyAvgLabel').textContent = '月平均 (' + thisYear + '年)';

            const moodCounts = { 'Good': 0, 'Okay': 0, 'Bad': 0, 'Sad': 0, 'Angry': 0 };
            allDiaries.forEach(d => {
                if (moodCounts[d.mood] !== undefined) { moodCounts[d.mood]++; }
                else if (moodMapKo[d.mood]) {
                    const englishMood = moodMapKo[d.mood];
                    if (moodCounts[englishMood] !== undefined) moodCounts[englishMood]++;
                }
            });

            const moodStatsEl = document.getElementById('moodStats');
            moodStatsEl.innerHTML = '';
            Object.entries(moodMap).forEach(([mood, emoji]) => {
                moodStatsEl.innerHTML += `<div class="mood-item"><div class="emoji">${emoji}</div><div class="count">${moodLabels[mood]}: ${moodCounts[mood]}</div></div>`;
            });

            const monthlyData = {};
            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            for (let i = 1; i <= 12; i++) {
                const month = `${thisYear}-${String(i).padStart(2, '0')}`;
                monthlyData[i] = allDiaries.filter(d => d.date.startsWith(month)).length;
            }
            const monthlyStatsEl = document.getElementById('monthlyStats');
            monthlyStatsEl.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const count = monthlyData[i];
                const monthId = 'currentMonth-' + i;
                monthlyStatsEl.innerHTML += '<div class="monthly-item" style="cursor: pointer; display: block; border-bottom: 1px solid var(--border-color); padding: 12px 0;"><div style="display: flex; justify-content: space-between;" onclick="toggleCurrentMonthDiaries(' + i + ')"><span>' + months[i-1] + '</span><div style="display: flex; align-items: center; gap: 8px;"><span style="font-weight: 600; color: var(--accent);">' + count + '件</span><i class="fas fa-chevron-down" id="icon-currentMonth-' + i + '"></i></div></div><div id="' + monthId + '" style="display: none; margin-top: 12px;"></div></div>';
            }
        }

        async function loadGoal() {
            try {
                const goal = await db.goals.get(1);
                const displayArea = document.getElementById('goalDisplayArea');
                const editArea = document.getElementById('goalEditArea');
                const displayText = document.getElementById('goalDisplayText');
                const cancelBtn = document.getElementById('cancelGoalBtn');
                
                if (goal && goal.memo && goal.memo.trim() !== '') {
                    displayText.textContent = goal.memo;
                    displayArea.style.display = 'block';
                    editArea.style.display = 'none';
                    localStorage.setItem('diaryGoalFirstLine', getFirstLine(goal.memo));
                } else {
                    displayArea.style.display = 'none';
                    editArea.style.display = 'block';
                    cancelBtn.style.display = 'none';
                    document.getElementById('goalMemoInput').value = '';
                    localStorage.removeItem('diaryGoalFirstLine');
                }
            } catch (error) { console.error(error); }
        }

        function getFirstLine(text) {
            if (!text) return '';
            const firstLine = text.split('\n')[0].trim();
            if (firstLine.length > 30) return firstLine.substring(0, 30) + '...';
            return firstLine;
        }

        async function saveGoal() {
            const memo = document.getElementById('goalMemoInput').value.trim();
            if (!memo) { alert('決意を入力してください。'); return; }
            try {
                await db.goals.put({ id: 1, memo: memo });
                localStorage.setItem('diaryGoalFirstLine', getFirstLine(memo));
                if (window.parent !== window) window.parent.postMessage({ type: 'goalUpdate' }, '*');
                alert('決意を保存しました！💪');
                loadGoal();
            } catch (error) { alert('保存エラー: ' + error); }
        }

        function editGoal() {
            const displayArea = document.getElementById('goalDisplayArea');
            const editArea = document.getElementById('goalEditArea');
            const displayText = document.getElementById('goalDisplayText');
            const cancelBtn = document.getElementById('cancelGoalBtn');
            document.getElementById('goalMemoInput').value = displayText.textContent;
            displayArea.style.display = 'none';
            editArea.style.display = 'block';
            cancelBtn.style.display = 'inline-flex';
        }

        function cancelEditGoal() { loadGoal(); }

        async function deleteGoal() {
            if (confirm('決意を削除しますか？')) {
                try {
                    await db.goals.delete(1);
                    localStorage.removeItem('diaryGoalFirstLine');
                    if (window.parent !== window) window.parent.postMessage({ type: 'goalUpdate' }, '*');
                    alert('決意を削除しました。');
                    loadGoal();
                } catch (error) { alert('削除エラー: ' + error); }
            }
        }

        async function globalReset() {
            if (confirm('⚠️ 全ての日記を永久に削除しますか？')) {
                if (confirm('本当によろしいですか？この操作は元に戻せません。')) {
                    try {
                        await db.diaries.clear();
                        await db.goals.clear();
                        localStorage.removeItem('diaryGoalFirstLine');
                        if (window.parent !== window) window.parent.postMessage({ type: 'goalUpdate' }, '*');
                        alert('全ての日記が削除されました。');
                        showPage(1);
                        renderDiaryList();
                    } catch (error) { alert('リセットエラー: ' + error); }
                }
            }
        }

        async function displayDataAsJson() {
            try {
                const allDiaries = await db.diaries.toArray();
                const allGoals = await db.goals.toArray();
                const backupData = { diaries: allDiaries, goals: allGoals, timestamp: new Date().toISOString(), version: '1.0' };
                if (allDiaries.length === 0 && allGoals.length === 0) { alert('バックアップするデータがありません。'); return; }
                const jsonString = JSON.stringify(backupData, null, 2);
                const win = window.open("", "_blank", "width=600,height=600");
                win.document.write('<h2>バックアップデータ</h2><p style="color: #666;">下のテキストをコピーしてファイルに保存してください。</p><textarea style="width: 100%; height: 80%; font-size: 12px;">' + jsonString + '</textarea>');
                win.document.close();
            } catch (error) { alert('バックアップエラー: ' + error.message); }
        }

        function importDataFromJson(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!confirm('復元すると既存のデータが上書きされます。続行しますか？')) { event.target.value = ''; return; }
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const dataToImport = JSON.parse(e.target.result);
                    if (!dataToImport.diaries || !Array.isArray(dataToImport.diaries)) { alert("無効なバックアップファイルです。"); return; }
                    await db.diaries.bulkPut(dataToImport.diaries);
                    if (dataToImport.goals && dataToImport.goals.length > 0) {
                        await db.goals.clear();
                        await db.goals.put(dataToImport.goals[0]);
                        localStorage.setItem('diaryGoalFirstLine', getFirstLine(dataToImport.goals[0].memo));
                    }
                    if (window.parent !== window) window.parent.postMessage({ type: 'goalUpdate' }, '*');
                    alert(`復元完了！${dataToImport.diaries.length}件の日記を復元しました。`);
                    renderDiaryList();
                    showPage(1);
                } catch (error) { alert("復元失敗: " + error.message); }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function initializeApp() {
            document.getElementById('saveDiaryBtn').addEventListener('click', saveDiary);
            document.getElementById('searchBtn').addEventListener('click', () => {
                const query = document.getElementById('searchQuery').value;
                currentDisplayLimit = ENTRIES_PER_PAGE;
                renderDiaryList(query);
            });
            document.getElementById('listBtn').addEventListener('click', () => {
                document.getElementById('searchQuery').value = '';
                currentDisplayLimit = ENTRIES_PER_PAGE;
                isSearching = false;
                renderDiaryList();
            });
            document.getElementById('loadMoreBtn').addEventListener('click', () => {
                currentDisplayLimit += ENTRIES_PER_PAGE;
                renderDiaryList(isSearching ? document.getElementById('searchQuery').value : null);
            });
            document.getElementById('prevPageBtn').addEventListener('click', () => showPage(currentPage - 1));
            document.getElementById('nextPageBtn').addEventListener('click', () => showPage(currentPage + 1));
            document.getElementById('saveGoalBtn').addEventListener('click', saveGoal);
            document.getElementById('editGoalBtn').addEventListener('click', editGoal);
            document.getElementById('deleteGoalBtn').addEventListener('click', deleteGoal);
            document.getElementById('cancelGoalBtn').addEventListener('click', cancelEditGoal);
            document.getElementById('globalResetBtn').addEventListener('click', globalReset);
            
            renderDiaryList();
            showPage(1);
            loadGoal();
        }

        window.onload = initializeApp;
        window.viewDiary = viewDiary;
        window.deleteDiary = deleteDiary;
        window.displayDataAsJson = displayDataAsJson;
        window.importDataFromJson = importDataFromJson;

        async function loadPastYears() {
            const allDiaries = await db.diaries.toArray();
            const currentYear = new Date().getFullYear();
            const yearlyData = {};
            allDiaries.forEach(diary => {
                const year = parseInt(diary.date.substring(0, 4));
                if (year < currentYear) {
                    if (!yearlyData[year]) yearlyData[year] = [];
                    yearlyData[year].push(diary);
                }
            });
            const pastYears = Object.keys(yearlyData).map(y => parseInt(y)).sort((a, b) => b - a);
            const container = document.getElementById('pastYearsSection');
            if (pastYears.length === 0) {
                container.innerHTML = '<div class="card"><div class="empty-state"><i class="fas fa-folder-open"></i><p>過去の年の日記はありません</p></div></div>';
                return;
            }
            let html = '';
            pastYears.forEach(year => {
                const diaries = yearlyData[year];
                html += '<div class="card" style="margin-bottom: 12px;"><button class="btn btn-secondary" onclick="toggleYearMonths(' + year + ')" style="width: 100%; justify-content: space-between; background: var(--bg-primary);"><span><i class="fas fa-calendar-alt"></i> ' + year + '年 (' + diaries.length + '件)</span><i class="fas fa-chevron-down" id="yearIcon' + year + '"></i></button><div id="yearMonths' + year + '" style="display: none; margin-top: 12px;"></div></div>';

        async function mobileBackup() {
            const diaries = await db.diaries.toArray();
            const goals = await db.goals.toArray();
            if (diaries.length === 0 && goals.length === 0) { alert('バックアップするデータがありません。'); return; }
            const data = JSON.stringify({ diaries, goals }, null, 2);
            const today = new Date().toISOString().slice(0, 10);
            const fileName = `diary_backup_${today}.json`;
            if (navigator.share && navigator.canShare) {
                const file = new File([data], fileName, { type: 'application/json' });
                if (navigator.canShare({ files: [file] })) {
                    try { await navigator.share({ files: [file], title: '日記バックアップ', text: '日記バックアップファイル。' }); return; }
                    catch (err) { if (err.name === 'AbortError') return; }
                }
                try { await navigator.share({ title: '日記バックアップ', text: data }); return; }
                catch (err) { if (err.name === 'AbortError') return; }
            }
            try { await navigator.clipboard.writeText(data); alert('バックアップデータをクリップボードにコピーしました！\n\nメモアプリに貼り付けるか自分に送信してください。'); }
            catch (err) { displayDataAsJson(); }
        }
        window.mobileBackup = mobileBackup;

        let recognition = null;
        let isRecording = false;
        let currentVoiceTarget = null;
        let currentVoiceBtn = null;

        function toggleVoiceInput(targetId) {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('このブラウザは音声認識に対応していません。\nChromeまたはEdgeをご利用ください。');
                return;
            }
            if (isRecording) { stopVoiceInput(); } else { startVoiceInput(targetId, event.target.closest('.voice-btn')); }
        }

        function startVoiceInput(targetId, btn) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.continuous = true;
            recognition.interimResults = true;
            currentVoiceTarget = document.getElementById(targetId);
            currentVoiceBtn = btn;
            recognition.onstart = () => {
                isRecording = true;
                if (currentVoiceBtn) { currentVoiceBtn.classList.add('recording'); currentVoiceBtn.innerHTML = '<i class="fas fa-stop"></i>'; }
            };
            recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                }
                if (finalTranscript && currentVoiceTarget) currentVoiceTarget.value += finalTranscript + ' ';
            };
            recognition.onerror = (event) => {
                console.log('音声認識エラー:', event.error);
                stopVoiceInput();
                if (event.error === 'not-allowed') alert('マイクの許可が必要です。\nブラウザの設定でマイクを許可してください。');
            };
            recognition.onend = () => { if (isRecording) recognition.start(); };
            recognition.start();
        }

        function stopVoiceInput() {
            if (recognition) {
                isRecording = false;
                recognition.stop();
                if (currentVoiceBtn) { currentVoiceBtn.classList.remove('recording'); currentVoiceBtn.innerHTML = '<i class="fas fa-microphone"></i>'; }
                currentVoiceTarget = null;
                currentVoiceBtn = null;
            }
        }
        window.toggleVoiceInput = toggleVoiceInput;
    </script>
</body>
</html>
