<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일기 - TodayTab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <script src="https://unpkg.com/dexie@3.2.3/dist/dexie.js"></script>
    <style>
    /* ── 일기 전용 스타일 ── */
    /* 오로라 배경 B: 바다+노을 */
    body { background: #eaf0f5; }
    .blob-1 { width:220px;height:220px;top:-70px;left:-50px;background:#87ceeb; }
    .blob-2 { width:170px;height:170px;top:30px;right:-30px;background:#98e8c8; }
    .blob-3 { width:190px;height:190px;bottom:-50px;right:10px;background:#ffb347;opacity:0.4; }
    .blob-4 { width:150px;height:150px;bottom:20px;left:20px;background:#ffb6c1;opacity:0.45; }
    /* 일기 전용 */
    .diary-entry{background:rgba(255,255,255,0.55);backdrop-filter:var(--glass-blur);border-radius:var(--radius);padding:14px;margin-bottom:8px;transition:var(--transition);}
    .diary-entry:hover{background:rgba(255,255,255,0.7);}
    .diary-title{font-size:15px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:8px;margin-bottom:4px;}
    .diary-mood{font-size:1.1rem;}
    .diary-date{font-size:11px;font-weight:300;color:var(--text-muted);margin-bottom:6px;}
    .diary-content{font-size:13px;font-weight:500;color:var(--text-secondary);line-height:1.5;max-height:60px;overflow:hidden;text-overflow:ellipsis;margin-bottom:10px;}
    .diary-actions{display:flex;gap:8px;}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
    .mood-stats{display:flex;flex-wrap:wrap;gap:8px;}
    .mood-item{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.55);border-radius:var(--radius);padding:8px 12px;font-size:12px;font-weight:500;color:var(--text-secondary);}
    .mood-item .emoji{font-size:1.2rem;}
    .monthly-item{border-bottom:1px solid rgba(255,255,255,0.6);padding:12px 0;}
    .search-group{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
    .search-group > div{flex:1;position:relative;min-width:0;}
    .load-more-btn{width:100%;justify-content:center;margin-top:4px;}
    .backup-toggle-btn{width:100%;justify-content:space-between;background:rgba(255,255,255,0.45);color:var(--text-secondary);margin-bottom:8px;}
    .textarea-wrapper{position:relative;}
    .goal-section{margin-bottom:14px;}
    </style>
</head>
<body>
<!-- 오로라 배경 B -->
<div class="aurora">
    <div class="blob blob-1" style="width:220px;height:220px;top:-70px;left:-50px;background:#87ceeb"></div>
    <div class="blob" style="width:170px;height:170px;top:30px;right:-30px;background:#98e8c8"></div>
    <div class="blob" style="width:190px;height:190px;bottom:-50px;right:10px;background:#ffb347;opacity:0.4"></div>
    <div class="blob" style="width:150px;height:150px;bottom:20px;left:20px;background:#ffb6c1;opacity:0.45"></div>
</div>

<div class="container">
    <!-- 헤더 -->
    <div class="page-header">
        <h1><i class="fas fa-book"></i><span data-i18n="diary">일기</span></h1>
    </div>

    <!-- 페이지 nav -->
    <div class="nav-bar">
        <button id="prevPageBtn" class="nav-btn"><i class="fas fa-chevron-left"></i></button>
        <span class="page-indicator" id="pageIndicator">1 / 3</span>
        <button id="nextPageBtn" class="nav-btn"><i class="fas fa-chevron-right"></i></button>
    </div>

    <!-- 페이지 1: 작성 + 목록 -->
    <div id="page1" class="page-content active">
        <div class="card">
            <div class="card-title"><i class="fas fa-pen"></i><span data-i18n="writeDiary">일기 작성</span></div>
            <div class="form-group">
                <input type="text" id="title" class="form-input" data-i18n-placeholder="enterTitle" placeholder="제목을 입력하세요" style="padding-right:44px">
                <button type="button" onclick="toggleVoiceInput('title')" class="voice-btn voice-btn-input"><i class="fas fa-microphone"></i></button>
            </div>
            <div class="form-group">
                <textarea id="content" class="form-textarea" data-i18n-placeholder="enterContent" placeholder="오늘 하루를 기록해 보세요..."></textarea>
                <button type="button" onclick="toggleVoiceInput('content')" class="voice-btn"><i class="fas fa-microphone"></i></button>
            </div>
            <div class="mood-group">
                <select id="moodSelect" class="form-select">
                    <option value="좋음">😄 좋음</option>
                    <option value="보통" selected>🙂 보통</option>
                    <option value="나쁨">🙁 나쁨</option>
                    <option value="슬픔">😭 슬픔</option>
                    <option value="화남">😡 화남</option>
                </select>
                <button id="saveDiaryBtn" class="btn btn-primary"><i class="fas fa-save"></i> <span data-i18n="save">저장</span></button>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-list"></i><span data-i18n="diaryList">최근 일기</span></div>
            <div class="search-group">
                <div>
                    <input type="text" id="searchQuery" class="form-input" data-i18n-placeholder="searchPlaceholder" placeholder="제목 또는 내용으로 검색" style="padding-right:44px">
                    <button type="button" onclick="toggleVoiceInput('searchQuery')" class="voice-btn voice-btn-input"><i class="fas fa-microphone"></i></button>
                </div>
                <button id="searchBtn" class="btn btn-secondary btn-sm" data-i18n="search">검색</button>
                <button id="listBtn" class="btn btn-secondary btn-sm">All</button>
            </div>
            <div id="diaryList">
                <div class="empty-state"><i class="fas fa-book-open"></i><p>이번 달 일기가 없습니다</p></div>
            </div>
            <button id="loadMoreBtn" class="btn btn-secondary load-more-btn" style="display:none" data-i18n="showMore">더보기</button>
        </div>
    </div>

    <!-- 페이지 2: 통계 -->
    <div id="page2" class="page-content">
        <div class="card">
            <div class="card-title"><i class="fas fa-chart-bar"></i><span data-i18n="statistics">일기 통계</span></div>
            <div class="stats-grid">
                <div class="stat-box"><div class="label" data-i18n="thisMonth">이번 달</div><div class="value" id="thisMonthCount">0</div></div>
                <div class="stat-box"><div class="label" data-i18n="thisYear">올해</div><div class="value" id="thisYearCount">0</div></div>
                <div class="stat-box"><div class="label" data-i18n="total">전체</div><div class="value" id="totalCount">0</div></div>
                <div class="stat-box"><div class="label" id="monthlyAvgLabel">월 평균</div><div class="value" id="avgPerMonth">0</div></div>
            </div>
            <div class="card-title" style="margin-top:16px"><i class="fas fa-face-smile"></i><span data-i18n="moodStats">기분 통계</span></div>
            <div class="mood-stats" id="moodStats"></div>
        </div>
        <div class="card">
            <div class="card-title"><i class="fas fa-calendar"></i><span data-i18n="monthlyStats">월별 일기 수</span></div>
            <div class="monthly-list" id="monthlyStats"></div>
        </div>
        <button class="btn btn-secondary btn-full" onclick="togglePastYears()" style="margin-bottom:12px">
            <i class="fas fa-history" id="pastYearsIcon"></i>
            <span id="pastYearsText">이전 년도 보기</span>
        </button>
        <div id="pastYearsSection" style="display:none"></div>
    </div>

    <!-- 페이지 3: 다짐 + 백업 -->
    <div id="page3" class="page-content">
        <div class="card">
            <div class="card-title"><i class="fas fa-bullseye"></i><span data-i18n="myResolution">나의 다짐</span></div>
            <div id="goalDisplayArea" style="display:none">
                <div class="goal-display" id="goalDisplayText"></div>
                <div style="display:flex;gap:8px">
                    <button id="editGoalBtn" class="btn btn-secondary btn-sm"><i class="fas fa-edit"></i> <span data-i18n="edit">수정</span></button>
                    <button id="deleteGoalBtn" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i> <span data-i18n="delete">삭제</span></button>
                </div>
            </div>
            <div id="goalEditArea">
                <div class="form-group">
                    <textarea id="goalMemoInput" class="form-textarea" placeholder="나의 다짐을 적어보세요..." style="min-height:100px"></textarea>
                </div>
                <div style="display:flex;gap:8px">
                    <button id="saveGoalBtn" class="btn btn-primary"><i class="fas fa-save"></i> <span data-i18n="save">저장</span></button>
                    <button id="cancelGoalBtn" class="btn btn-secondary" style="display:none"><span data-i18n="cancel">취소</span></button>
                </div>
            </div>
        </div>

        <div class="card">
            <button class="btn btn-secondary backup-toggle-btn" onclick="toggleBackupSection()">
                <span><i class="fas fa-database"></i> <span data-i18n="backup">백업/초기화</span></span>
                <i class="fas fa-chevron-down" id="backupToggleIcon"></i>
            </button>
            <div id="backupSection" style="display:none">
                <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
                    <button class="btn btn-secondary btn-full" onclick="mobileBackup()"><i class="fas fa-cloud-arrow-up"></i> <span data-i18n="backup">백업</span></button>
                    <label class="btn btn-secondary btn-full" style="cursor:pointer">
                        <i class="fas fa-cloud-arrow-down"></i> <span data-i18n="restore">복원</span>
                        <input type="file" accept=".json" onchange="importDataFromJson(event)" style="display:none">
                    </label>
                    <button id="globalResetBtn" class="btn btn-danger btn-full"><i class="fas fa-trash"></i> <span data-i18n="reset">모든 일기 초기화</span></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="lang.js"></script>
<script>
    // 언어/테마 메시지 수신
    window.addEventListener('message', (event) => {
        if (event.data.type === 'themeChange') {
            document.body.classList.remove('theme-gray');
            if (event.data.theme === 'gray') document.body.classList.add('theme-gray');
        }
        if (event.data.type === 'languageChange') {
            currentLang = event.data.lang;
            localStorage.setItem('appLanguage', currentLang);
            applyLanguage();
            renderDiaryList();
        }
    });

    const db = new Dexie('StableDiaryDB_InitialDesign');
    db.version(56).stores({ diaries: '++id, title, content, date, mood', goals: 'id' });

    const moodMap = { '좋음':'😄','보통':'🙂','나쁨':'🙁','슬픔':'😭','화남':'😡' };
    const ENTRIES_PER_PAGE = 5;
    let currentDisplayLimit = ENTRIES_PER_PAGE;
    let isSearching = false;
    let currentPage = 1;
    const totalPages = 3;

    function getLocale() {
        const m = {ko:'ko-KR',en:'en-US',ja:'ja-JP',zh:'zh-CN'};
        return m[currentLang]||'ko-KR';
    }

    function showPage(n) {
        currentPage = Math.min(Math.max(n,1),totalPages);
        document.querySelectorAll('.page-content').forEach(el=>el.classList.remove('active'));
        document.getElementById('page'+currentPage).classList.add('active');
        document.getElementById('pageIndicator').textContent = currentPage+' / '+totalPages;
        document.getElementById('prevPageBtn').disabled = (currentPage===1);
        document.getElementById('nextPageBtn').disabled = (currentPage===totalPages);
        if(currentPage===2) updateStats();
        if(currentPage===3) loadGoal();
    }

    function formatDate(isoDate) {
        const date = new Date(isoDate);
        return date.toLocaleDateString(getLocale(),{year:'numeric',month:'2-digit',day:'2-digit',weekday:'short',hour:'2-digit',minute:'2-digit',hour12:true});
    }

    async function saveDiary() {
        const title = document.getElementById('title').value.trim();
        const content = document.getElementById('content').value.trim();
        const mood = document.getElementById('moodSelect').value;
        if(!title||!content){alert(t('enterTitle')+' & '+t('enterContent'));return;}
        try {
            await db.diaries.add({title,content,date:new Date().toISOString(),mood});
            document.getElementById('title').value='';
            document.getElementById('content').value='';
            document.getElementById('moodSelect').value='보통';
            isSearching=false; currentDisplayLimit=ENTRIES_PER_PAGE;
            document.getElementById('searchQuery').value='';
            renderDiaryList();
            alert('일기가 저장되었습니다! 📝');
        } catch(e){alert('저장 중 오류가 발생했습니다.');console.error(e);}
    }

    async function deleteDiary(id) {
        if(confirm('이 일기를 삭제하시겠습니까?')){
            try{await db.diaries.delete(id);renderDiaryList();}catch(e){console.error(e);}
        }
    }

    async function renderDiaryList(query=null) {
        const el = document.getElementById('diaryList');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        let allDiaries;
        const now = new Date();
        const thisMonth = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
        try {
            if(query&&query.trim()!==''){
                isSearching=true;
                const q=query.trim().toLowerCase();
                const filtered=await db.diaries.filter(d=>{
                    return d.date.startsWith(thisMonth)&&(
                        d.title.toLowerCase().includes(q)||
                        d.content.toLowerCase().includes(q)||
                        formatDate(d.date).toLowerCase().includes(q)
                    );
                }).toArray();
                allDiaries=filtered.reverse();
            } else {
                isSearching=false;
                const m=await db.diaries.filter(d=>d.date.startsWith(thisMonth)).toArray();
                allDiaries=m.reverse();
            }
        } catch(e){console.error(e);allDiaries=[];}

        el.innerHTML='';
        if(allDiaries.length===0){
            el.innerHTML='<div class="empty-state"><i class="fas fa-book-open"></i><p>'+(isSearching?'검색 결과가 없습니다':'이번 달 일기가 없습니다')+'</p></div>';
            loadMoreBtn.style.display='none'; return;
        }
        allDiaries.slice(0,currentDisplayLimit).forEach(diary=>{
            const div=document.createElement('div');
            div.className='diary-entry';
            const emoji=moodMap[diary.mood]||'❓';
            div.innerHTML=`<div class="diary-title">${diary.title}<span class="diary-mood">${emoji}</span></div><div class="diary-date">${formatDate(diary.date)}</div><div class="diary-content">${diary.content}</div><div class="diary-actions"><button class="btn btn-secondary btn-sm" onclick="viewDiary(${diary.id})"><i class="fas fa-eye"></i> 보기</button><button class="btn btn-danger btn-sm" onclick="deleteDiary(${diary.id})"><i class="fas fa-trash"></i> 삭제</button></div>`;
            el.appendChild(div);
        });
        if(allDiaries.length>currentDisplayLimit){
            loadMoreBtn.textContent='더보기 ('+Math.min(allDiaries.length-currentDisplayLimit,ENTRIES_PER_PAGE)+'개)';
            loadMoreBtn.style.display='block';
        } else {loadMoreBtn.style.display='none';}
    }

    async function viewDiary(id) {
        const diary=await db.diaries.get(id);
        if(diary) alert(`📝 ${diary.title} ${moodMap[diary.mood]||''}\n\n📅 ${formatDate(diary.date)}\n\n${diary.content}`);
    }

    async function updateStats() {
        const all=await db.diaries.toArray();
        const now=new Date();
        const yr=now.getFullYear();
        const thisMonth=yr+'-'+String(now.getMonth()+1).padStart(2,'0');
        document.getElementById('thisMonthCount').textContent=all.filter(d=>d.date.startsWith(thisMonth)).length;
        const yrArr=all.filter(d=>d.date.startsWith(String(yr)));
        document.getElementById('thisYearCount').textContent=yrArr.length;
        document.getElementById('totalCount').textContent=all.length;
        document.getElementById('avgPerMonth').textContent=yrArr.length>0?Math.round(yrArr.length/(now.getMonth()+1)):0;
        document.getElementById('monthlyAvgLabel').textContent='월 평균 ('+yr+'년)';

        const mc={};Object.keys(moodMap).forEach(m=>mc[m]=0);
        all.forEach(d=>{if(mc[d.mood]!==undefined)mc[d.mood]++;});
        document.getElementById('moodStats').innerHTML=Object.entries(moodMap).map(([m,e])=>`<div class="mood-item"><div class="emoji">${e}</div><div class="count">${m}: ${mc[m]}</div></div>`).join('');

        const ms=document.getElementById('monthlyStats');
        ms.innerHTML='';
        for(let i=1;i<=12;i++){
            const cnt=all.filter(d=>d.date.startsWith(yr+'-'+String(i).padStart(2,'0'))).length;
            const mid='currentMonth-'+i;
            ms.innerHTML+=`<div class="monthly-item"><div style="display:flex;justify-content:space-between;cursor:pointer" onclick="toggleCurrentMonthDiaries(${i})"><span>${i}월</span><div style="display:flex;align-items:center;gap:8px"><span style="font-weight:700;color:var(--accent)">${cnt}개</span><i class="fas fa-chevron-down" id="icon-${mid}"></i></div></div><div id="${mid}" style="display:none;margin-top:10px"></div></div>`;
        }
    }

    async function loadGoal() {
        try {
            const goal=await db.goals.get(1);
            const da=document.getElementById('goalDisplayArea');
            const ea=document.getElementById('goalEditArea');
            const dt=document.getElementById('goalDisplayText');
            const cb=document.getElementById('cancelGoalBtn');
            if(goal&&goal.memo&&goal.memo.trim()){
                dt.textContent=goal.memo; da.style.display='block'; ea.style.display='none';
                localStorage.setItem('diaryGoalFirstLine',getFirstLine(goal.memo));
            } else {
                da.style.display='none'; ea.style.display='block'; cb.style.display='none';
                document.getElementById('goalMemoInput').value='';
                localStorage.removeItem('diaryGoalFirstLine');
            }
        } catch(e){console.error(e);}
    }

    function getFirstLine(text) {
        if(!text) return '';
        const f=text.split('\n')[0].trim();
        return f.length>30?f.substring(0,30)+'...':f;
    }

    async function saveGoal() {
        const memo=document.getElementById('goalMemoInput').value.trim();
        if(!memo){alert('다짐 내용을 입력해주세요.');return;}
        try {
            await db.goals.put({id:1,memo});
            localStorage.setItem('diaryGoalFirstLine',getFirstLine(memo));
            if(window.parent!==window) window.parent.postMessage({type:'goalUpdate'},'*');
            alert('다짐이 저장되었습니다! 💪');
            loadGoal();
        } catch(e){alert('저장 오류: '+e);}
    }

    function editGoal() {
        const dt=document.getElementById('goalDisplayText');
        document.getElementById('goalMemoInput').value=dt.textContent;
        document.getElementById('goalDisplayArea').style.display='none';
        document.getElementById('goalEditArea').style.display='block';
        document.getElementById('cancelGoalBtn').style.display='inline-flex';
    }
    function cancelEditGoal(){loadGoal();}

    async function deleteGoal() {
        if(confirm('다짐을 삭제하시겠습니까?')){
            try {
                await db.goals.delete(1);
                localStorage.removeItem('diaryGoalFirstLine');
                if(window.parent!==window) window.parent.postMessage({type:'goalUpdate'},'*');
                alert('다짐이 삭제되었습니다.');
                loadGoal();
            } catch(e){alert('삭제 오류: '+e);}
        }
    }

    async function globalReset() {
        if(confirm('⚠️ 모든 일기를 영구적으로 삭제하시겠습니까?')){
            if(confirm('정말로 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')){
                try {
                    await db.diaries.clear(); await db.goals.clear();
                    localStorage.removeItem('diaryGoalFirstLine');
                    if(window.parent!==window) window.parent.postMessage({type:'goalUpdate'},'*');
                    alert('모든 일기가 삭제되었습니다.');
                    showPage(1); renderDiaryList();
                } catch(e){alert('초기화 오류: '+e);}
            }
        }
    }

    async function mobileBackup() {
        const diaries=await db.diaries.toArray();
        const goals=await db.goals.toArray();
        if(!diaries.length&&!goals.length){alert('백업할 데이터가 없습니다.');return;}
        const data=JSON.stringify({diaries,goals},null,2);
        const today=new Date().toISOString().slice(0,10);
        const fileName=`일기_백업_${today}.json`;
        if(navigator.share&&navigator.canShare){
            const file=new File([data],fileName,{type:'application/json'});
            if(navigator.canShare({files:[file]})){
                try{await navigator.share({files:[file],title:'일기 백업',text:'일기 백업 파일입니다.'});return;}
                catch(err){if(err.name==='AbortError')return;}
            }
        }
        try{await navigator.clipboard.writeText(data);alert('백업 데이터가 클립보드에 복사되었습니다!\n\n카카오톡 "나에게 보내기" 또는 메모앱에 붙여넣기 하세요.');}
        catch(err){
            const win=window.open('','_blank','width=600,height=600');
            win.document.write('<h2>백업 데이터</h2><textarea style="width:100%;height:80%;font-size:12px">'+data+'</textarea>');
        }
    }

    function importDataFromJson(event) {
        const file=event.target.files[0]; if(!file)return;
        if(!confirm('복원 시 기존 데이터가 덮어쓰여집니다. 계속하시겠습니까?')){event.target.value='';return;}
        const reader=new FileReader();
        reader.onload=async function(e){
            try {
                const data=JSON.parse(e.target.result);
                if(!data.diaries||!Array.isArray(data.diaries)){alert('올바른 백업 파일이 아닙니다.');return;}
                await db.diaries.bulkPut(data.diaries);
                if(data.goals&&data.goals.length>0){
                    await db.goals.clear(); await db.goals.put(data.goals[0]);
                    localStorage.setItem('diaryGoalFirstLine',getFirstLine(data.goals[0].memo));
                }
                if(window.parent!==window) window.parent.postMessage({type:'goalUpdate'},'*');
                alert(`복원 완료! 일기 ${data.diaries.length}개가 복원되었습니다.`);
                renderDiaryList(); showPage(1);
            } catch(e){alert('복원 실패: '+e.message);}
            event.target.value='';
        };
        reader.readAsText(file);
    }

    function toggleBackupSection() {
        const s=document.getElementById('backupSection');
        const i=document.getElementById('backupToggleIcon');
        const hidden=s.style.display==='none';
        s.style.display=hidden?'block':'none';
        i.className=hidden?'fas fa-chevron-up':'fas fa-chevron-down';
    }

    function togglePastYears() {
        const s=document.getElementById('pastYearsSection');
        const t=document.getElementById('pastYearsText');
        if(s.style.display==='none'){s.style.display='block';t.textContent='이전 년도 접기';loadPastYears();}
        else{s.style.display='none';t.textContent='이전 년도 보기';}
    }

    async function loadPastYears() {
        const all=await db.diaries.toArray();
        const cur=new Date().getFullYear();
        const yd={};
        all.forEach(d=>{const y=parseInt(d.date.substring(0,4));if(y<cur){if(!yd[y])yd[y]=[];yd[y].push(d);}});
        const years=Object.keys(yd).map(y=>parseInt(y)).sort((a,b)=>b-a);
        const con=document.getElementById('pastYearsSection');
        if(!years.length){con.innerHTML='<div class="card"><div class="empty-state"><i class="fas fa-folder-open"></i><p>이전 년도 일기가 없습니다</p></div></div>';return;}
        con.innerHTML=years.map(y=>`<div class="card" style="margin-bottom:10px"><button class="btn btn-secondary btn-full" onclick="toggleYearMonths(${y})" style="justify-content:space-between"><span><i class="fas fa-calendar-alt"></i> ${y}년 (${yd[y].length}개)</span><i class="fas fa-chevron-down" id="yearIcon${y}"></i></button><div id="yearMonths${y}" style="display:none;margin-top:10px"></div></div>`).join('');
    }

    async function toggleCurrentMonthDiaries(month) {
        const mid='currentMonth-'+month;
        const con=document.getElementById(mid);
        const icon=document.getElementById('icon-'+mid);
        if(!con||!icon)return;
        if(con.style.display==='none'){
            const all=await db.diaries.toArray();
            const yr=new Date().getFullYear();
            const mk=yr+'-'+String(month).padStart(2,'0');
            const arr=all.filter(d=>d.date.startsWith(mk)).sort((a,b)=>new Date(b.date)-new Date(a.date));
            if(!arr.length){con.innerHTML='<div style="text-align:center;color:var(--text-muted);padding:12px;font-size:12px">일기가 없습니다</div>';}
            else{con.innerHTML=arr.map(d=>{const e=moodMap[d.mood]||'❓';const p=d.content.substring(0,50)+(d.content.length>50?'...':'');return`<div onclick="viewDiary(${d.id})" style="cursor:pointer;padding:12px;background:rgba(255,255,255,0.55);border-radius:var(--radius);margin-bottom:6px"><div style="display:flex;justify-content:space-between"><span style="font-weight:700;font-size:13px">${d.title||'제목 없음'}</span><span>${e}</span></div><div style="font-size:11px;color:var(--text-muted);margin-top:3px">${formatDate(d.date)}</div><div style="font-size:12px;color:var(--text-secondary);margin-top:3px">${p}</div></div>`;}).join('');}
            con.style.display='block'; icon.className='fas fa-chevron-up';
        } else {con.style.display='none';icon.className='fas fa-chevron-down';}
    }

    async function toggleYearMonths(year) {
        const con=document.getElementById('yearMonths'+year);
        const icon=document.getElementById('yearIcon'+year);
        if(!con||!icon)return;
        if(con.style.display==='none'){
            const all=await db.diaries.toArray();
            const yd=all.filter(d=>d.date.startsWith(year.toString()));
            let html='<div style="padding:8px">';
            for(let i=1;i<=12;i++){
                const mk=year+'-'+String(i).padStart(2,'0');
                const arr=yd.filter(d=>d.date.startsWith(mk));
                if(arr.length){
                    const pid='pastMonth-'+year+'-'+i;
                    html+=`<div style="margin-bottom:8px;background:rgba(255,255,255,0.4);border-radius:var(--radius);overflow:hidden"><div onclick="togglePastMonthDiaries(${year},${i})" style="cursor:pointer;padding:10px 12px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:700">${i}월</span><div style="display:flex;align-items:center;gap:6px"><span style="font-weight:700;color:var(--accent);font-size:12px">${arr.length}개</span><i class="fas fa-chevron-down" id="icon-${pid}"></i></div></div><div id="${pid}" style="display:none;padding:10px"></div></div>`;
                }
            }
            html+='</div>';
            con.innerHTML=html; con.style.display='block'; icon.className='fas fa-chevron-up';
        } else {con.style.display='none';icon.className='fas fa-chevron-down';}
    }

    async function togglePastMonthDiaries(year,month) {
        const pid='pastMonth-'+year+'-'+month;
        const con=document.getElementById(pid);
        const icon=document.getElementById('icon-'+pid);
        if(!con||!icon)return;
        if(con.style.display==='none'){
            const all=await db.diaries.toArray();
            const mk=year+'-'+String(month).padStart(2,'0');
            const arr=all.filter(d=>d.date.startsWith(mk)).sort((a,b)=>new Date(b.date)-new Date(a.date));
            con.innerHTML=arr.map(d=>{const e=moodMap[d.mood]||'❓';const p=d.content.substring(0,50)+(d.content.length>50?'...':'');return`<div onclick="viewDiary(${d.id})" style="cursor:pointer;padding:10px;background:rgba(255,255,255,0.55);border-radius:var(--radius);margin-bottom:6px"><div style="display:flex;justify-content:space-between"><span style="font-weight:700;font-size:13px">${d.title||'제목 없음'}</span><span>${e}</span></div><div style="font-size:11px;color:var(--text-muted);margin-top:3px">${formatDate(d.date)}</div><div style="font-size:12px;color:var(--text-secondary);margin-top:3px">${p}</div></div>`;}).join('');
            con.style.display='block'; icon.className='fas fa-chevron-up';
        } else {con.style.display='none';icon.className='fas fa-chevron-down';}
    }

    // 음성 입력
    let recognition=null,isRecording=false,currentVoiceTarget=null,currentVoiceBtn=null;
    function toggleVoiceInput(targetId){
        if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
            alert('이 브라우저는 음성 인식을 지원하지 않습니다.\n크롬 또는 엣지 브라우저를 사용해주세요.');return;
        }
        if(isRecording)stopVoiceInput();else startVoiceInput(targetId,event.target.closest('.voice-btn'));
    }
    function startVoiceInput(targetId,btn){
        const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
        recognition=new SR(); recognition.lang='ko-KR'; recognition.continuous=true; recognition.interimResults=true;
        currentVoiceTarget=document.getElementById(targetId); currentVoiceBtn=btn;
        recognition.onstart=()=>{isRecording=true;if(currentVoiceBtn){currentVoiceBtn.classList.add('recording');currentVoiceBtn.innerHTML='<i class="fas fa-stop"></i>';}};
        recognition.onresult=(e)=>{let f='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)f+=e.results[i][0].transcript;}if(f&&currentVoiceTarget)currentVoiceTarget.value+=f+' ';};
        recognition.onerror=(e)=>{console.log('오류:',e.error);stopVoiceInput();if(e.error==='not-allowed')alert('마이크 사용 권한이 필요합니다.');};
        recognition.onend=()=>{if(isRecording)recognition.start();};
        recognition.start();
    }
    function stopVoiceInput(){
        if(recognition){isRecording=false;recognition.stop();if(currentVoiceBtn){currentVoiceBtn.classList.remove('recording');currentVoiceBtn.innerHTML='<i class="fas fa-microphone"></i>';}currentVoiceTarget=null;currentVoiceBtn=null;}
    }

    function initializeApp() {
        document.getElementById('saveDiaryBtn').addEventListener('click',saveDiary);
        document.getElementById('searchBtn').addEventListener('click',()=>{currentDisplayLimit=ENTRIES_PER_PAGE;renderDiaryList(document.getElementById('searchQuery').value);});
        document.getElementById('listBtn').addEventListener('click',()=>{document.getElementById('searchQuery').value='';currentDisplayLimit=ENTRIES_PER_PAGE;isSearching=false;renderDiaryList();});
        document.getElementById('loadMoreBtn').addEventListener('click',()=>{currentDisplayLimit+=ENTRIES_PER_PAGE;renderDiaryList(isSearching?document.getElementById('searchQuery').value:null);});
        document.getElementById('prevPageBtn').addEventListener('click',()=>showPage(currentPage-1));
        document.getElementById('nextPageBtn').addEventListener('click',()=>showPage(currentPage+1));
        document.getElementById('saveGoalBtn').addEventListener('click',saveGoal);
        document.getElementById('editGoalBtn').addEventListener('click',editGoal);
        document.getElementById('deleteGoalBtn').addEventListener('click',deleteGoal);
        document.getElementById('cancelGoalBtn').addEventListener('click',cancelEditGoal);
        document.getElementById('globalResetBtn').addEventListener('click',globalReset);
        renderDiaryList(); showPage(1); loadGoal();
    }

    window.onload = initializeApp;
    window.viewDiary=viewDiary; window.deleteDiary=deleteDiary;
    window.toggleVoiceInput=toggleVoiceInput;
    window.toggleCurrentMonthDiaries=toggleCurrentMonthDiaries;
    window.toggleYearMonths=toggleYearMonths;
    window.togglePastMonthDiaries=togglePastMonthDiaries;
    window.togglePastYears=togglePastYears;
    window.toggleBackupSection=toggleBackupSection;
    window.mobileBackup=mobileBackup;
    window.importDataFromJson=importDataFromJson;
</script>
